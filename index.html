<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور | Islam Noor - اكتشف الإسلام بجمال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .arabic { font-family: 'Amiri', serif; }
        .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.18); }
        .dark .glass { background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1); }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1585036156171-384164a8c675?ixlib=rb-1.2.1&auto=format&fit=crop&w=2000&q=80'); background-size: cover; }
    </style>
</head>
<body class="bg-slate-950 text-white dark" id="body">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full glass z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">ﷺ</div>
                <span class="text-3xl font-bold tracking-tighter">نور</span>
            </div>

            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-emerald-400 transition">الرئيسية</a>
                <a href="quran.html" class="hover:text-emerald-400 transition">القرآن</a>
                <a href="prayer.html" class="hover:text-emerald-400 transition">تعلم الصلاة</a>
                <a href="shahada.html" class="hover:text-emerald-400 transition">الشهادة</a>
                <a href="#sections" class="hover:text-emerald-400 transition">الأقسام</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="px-6 py-3 rounded-3xl glass text-sm font-medium hover:bg-white/20">EN / عربي</button>
                <button onclick="toggleDarkMode()" class="w-11 h-11 glass rounded-3xl flex items-center justify-center text-xl">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero-bg min-h-screen flex items-center">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-bold leading-tight mb-6">
                <span class="lang-en">Discover the Beauty of Islam</span>
                <span class="lang-ar arabic">اكتشف جمال الإسلام</span>
            </h1>
            <p class="text-xl text-emerald-100 max-w-2xl mx-auto">
                <span class="lang-en">A peaceful, elegant, and respectful guide for new Muslims and seekers of truth.</span>
                <span class="lang-ar">دليل هادئ وأنيق ومحترم للمسلمين الجدد ولكل باحث عن الحق.</span>
            </p>
            <div class="mt-12 flex flex-col sm:flex-row gap-6 justify-center">
                <a href="shahada.html" class="px-10 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl font-semibold">ابدأ رحلتك</a>
                <a href="quran.html" class="px-10 py-5 glass hover:bg-white/20 rounded-3xl text-xl">اقرأ القرآن</a>
            </div>
        </div>
    </section>

    <!-- Quick Sections -->
    <section id="sections" class="max-w-7xl mx-auto px-6 py-24">
        <h2 class="text-4xl font-bold text-center mb-16">استكشف الإسلام</h2>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- كرر البطاقات لكل الأقسام اللي ذكرتها (أركان، من هو الله، قصص، إلخ) -->
            <!-- مثال واحد، أكمله حسب الحاجة -->
        </div>
    </section>

    <script>
        // نفس الدوال السابقة + تحسينات
        function toggleLanguage() {
            const html = document.getElementById('html-tag');
            html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
            html.lang = html.lang === 'ar' ? 'en' : 'ar';
        }

        function toggleDarkMode() {
            document.getElementById('body').classList.toggle('dark');
        }
    </script>
</body>
</html>
