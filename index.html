<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور | Islam Noor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .arabic { font-family: 'Amiri', serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1585036156171-384164a8c675?ixlib=rb-1.2.1&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
        }
        
        .glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full glass z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 border-2 border-emerald-400 rounded-2xl flex items-center justify-center text-2xl">🌙</div>
                <span class="text-2xl font-bold">نور</span>
            </div>
            <button onclick="toggleLanguage()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-sm">
                عربي / EN
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg min-h-screen flex items-center pt-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-6xl font-bold leading-tight mb-6 arabic">
                اكتشف السلام الداخلي
            </h1>
            <p class="text-lg md:text-xl text-slate-300 max-w-2xl mx-auto mb-10">
                دليل هادئ ومحترم للإسلام يعتمد على القرآن الكريم والسنة الصحيحة
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="#start" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-3xl text-lg font-medium">
                    ابدأ رحلتك الآن
                </a>
            </div>
        </div>
    </section>

    <script>
        function toggleLanguage() {
            const html = document.getElementById('html-tag');
            if (html.dir === 'rtl') {
                html.dir = 'ltr';
                html.lang = 'en';
            } else {
                html.dir = 'rtl';
                html.lang = 'ar';
            }
        }

        // Tailwind script
        tailwind.config = {
            content: [],
            theme: {
                extend: {}
            }
        }
    </script>
</body>
</html>
